name: CI

on:
  push:
    branches: [ "main", "feature/gestion-pesca" ]
  pull_request:
    branches: [ "main", "feature/gestion-pesca" ]

jobs:
  verificar:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Instalar Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Compilar (go build)
        run: go build ./...

      - name: Analizar código (go vet)
        run: go vet ./...

      - name: Ejecutar tests (go test)
        run: go test -v ./...

  # Milla 1 — Estructura del repositorio del profesor
  docker_build:
    runs-on: ubuntu-latest
    needs: verificar
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Validar construcción de imagen Docker
        run: docker build -t pesca-api:test .