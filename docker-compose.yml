# Orquesta dos servicios: la API (que construimos con el Dockerfile) y una base
# PostgreSQL. La API espera a que la base esté "healthy" antes de arrancar.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pesca
      POSTGRES_PASSWORD: pesca
      POSTGRES_DB: pesca_directa
    ports:
      - "5432:5432"
    volumes:
      # Volumen nombrado: los datos sobreviven a "docker compose down" (sin -v).
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pesca -d pesca_directa"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      PUERTO: ":8080"
      # En el contenedor usamos PostgreSQL.
      # El host "db" es el nombre del servicio de arriba:
      # docker compose lo resuelve por DNS interno.
      DB_DRIVER: postgres
      DB_DSN: "host=db user=pesca password=pesca dbname=pesca_directa port=5432 sslmode=disable TimeZone=America/Guayaquil"
      JWT_SECRETO: "cambia-esto-en-produccion"
      JWT_DURACION: "24h"
      STORAGE: gorm
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  dbdata: