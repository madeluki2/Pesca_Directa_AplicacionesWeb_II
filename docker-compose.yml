services:
  db:
    image: postgres:16-alpine
    container_name: pesca-postgres-db
    environment:
      POSTGRES_USER: pesca
      POSTGRES_PASSWORD: pesca
      POSTGRES_DB: pesca_directa
    ports:
      - "5432:5432"
    volumes:
      - postgres_pesca_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pesca -d pesca_directa"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: pesca-directa-api
    environment:
      PUERTO: "8080"
      STORAGE: "postgres"
      RUTA_DB: "/app/data/pesca.db"
      JWT_SECRETO: "cambia-esto-en-produccion-con-valor-largo-y-secreto"
      JWT_DURACION: "24h"
    ports:
      - "8080:8080"
    volumes:
      - dbdata:/app/data
    depends_on:
      db:
        condition: service_healthy

volumes:
  dbdata:
  postgres_pesca_data:
