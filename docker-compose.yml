services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pesca
      POSTGRES_PASSWORD: pesca
      POSTGRES_DB: pesca
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pesca -d pesca"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      PUERTO: ":8080"
      DB_DRIVER: postgres
      DB_DSN: "host=db user=pesca password=pesca dbname=pesca port=5432 sslmode=disable TimeZone=America/Guayaquil"
      STORAGE: gorm
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  dbdata: